name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daniel-cv-3d
    env:
      # Site is served at the domain root (danieltremer.com), no base path
      NEXT_PUBLIC_BASE_PATH: ""
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: daniel-cv-3d/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: daniel-cv-3d/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      # The root domain (danieltremer.com) is served by DanielTea.github.io,
      # which rebuilds this repo on a daily cron. Fire its deploy workflow
      # now so the root picks up this merge immediately.
      - name: Trigger root-domain deploy (danieltremer.com)
        env:
          TOKEN: ${{ secrets.USER_SITE_DEPLOY_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::USER_SITE_DEPLOY_TOKEN secret not set; the root domain will sync on DanielTea.github.io's daily cron instead."
            exit 0
          fi
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DanielTea/DanielTea.github.io/actions/workflows/deploy-pages.yml/dispatches \
            --data '{"ref":"main"}'
